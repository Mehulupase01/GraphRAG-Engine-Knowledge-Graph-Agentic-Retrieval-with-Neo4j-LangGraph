name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install uv

      - name: Install project
        run: uv pip install --system ".[dev]"

      - name: Run unit tests
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests

      - name: Compile sources
        env:
          PYTHONPATH: src
        run: python -m compileall dashboard src tests

      - name: Runtime doctor
        env:
          PYTHONPATH: src
        run: python -m graphrag_engine.cli.main doctor
