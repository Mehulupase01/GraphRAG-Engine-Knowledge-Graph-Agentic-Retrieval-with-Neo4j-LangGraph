services:
  neo4j:
    image: neo4j:5.25-community
    container_name: graphrag-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/change-me-now
      NEO4J_server_memory_pagecache_size: 512M
      NEO4J_server_memory_heap_initial__size: 512M
      NEO4J_server_memory_heap_max__size: 1G
    volumes:
      - ./neo4j/data:/data
      - ./neo4j/logs:/logs

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: graphrag-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      GRAPH_RAG_NEO4J_URI: bolt://neo4j:7687
    command: uvicorn graphrag_engine.api.app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs
    depends_on:
      - neo4j

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: graphrag-dashboard
    restart: unless-stopped
    env_file:
      - .env
    environment:
      GRAPH_RAG_NEO4J_URI: bolt://neo4j:7687
    command: streamlit run dashboard/Home.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs
    depends_on:
      - api
